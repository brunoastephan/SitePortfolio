            <div class="slide-box">

                <img class="img-mobile" src="sliders/illustrations/mobile/09mob.png" alt="slide 9 mobile">

        <div>

    <!-----about project----->

    <section class="about-project">

            <h1 class="sub-title" id="lng-sub-title">illustrations</h1>
            <p class="about-text" id="lng-about-text1">Especially during the COVID-19 pandemic, due to social isolation, I tried to practice a bit of illustration. I did some commissions, but it was primarily a hobby.</p>

    <div class="footer">

    <script src="slider.js"></script>

    <script>
        const jsonPOR = {
            "lng-sub-title": "ilustrações",
            "lng-about-text1": "Sobretudo durante a pandemia de COVID-19, por conta do isolamento social, tentei praticar um pouco de ilustração. Fiz algumas comissões, mas era antes de tudo um hobby.",
            // "lng-link": "Saiba mais."
        }

        const jsonENG = {
            "lng-sub-title": "illustrations",
            "lng-about-text1": "Especially during the COVID-19 pandemic, due to social isolation, I tried to practice a bit of illustration. I did some commissions, but it was primarily a hobby.",
            // "lng-link": "Learn more."
        }

        document.querySelector('#language').addEventListener("change", function() {
            if (this.value == "eng") {
                // change all text to ENG
                for (let key in jsonENG) {
                document.querySelector('#' + key).textContent = jsonENG[key]
                }
            } else if (this.value == "por") {
                // change all text to POR
                for (let key in jsonPOR) {
                document.querySelector('#' + key).textContent = jsonPOR[key]
                }
            }
        })
    </script>
